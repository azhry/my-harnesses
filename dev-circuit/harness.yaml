name: dev-circuit
version: 0.1.0
tagline: From request to verified delivery.

principles:
  - one active task per delivery
  - separate implementer reviewer gatekeeper and merger identities
  - claims are not evidence
  - review and gate decisions bind to an exact git SHA
  - missing or stale evidence fails closed

linear_statuses:
  planned: Todo
  implementing: In Progress
  in_review: In Review
  review_failed: In Progress
  review_passed: Done

required_tools:
  - node>=20
  - git
  - gh

verification:
  command: npm run validate
  supervisor: npm run monitor
