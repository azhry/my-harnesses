name: agent-spec-ops
version: 0.1.0
owner: Azhary Arliansyah

principle: "Small state machine, checklist transitions, Linear-backed tasks, parallel dev/test agents, human gates."

state_order:
  - intake
  - tool_readiness
  - knowledge_discovery
  - product_requirements
  - product_review
  - design_assembly
  - system_rules
  - system_rules_review
  - task_breakdown
  - implementation_in_progress
  - implementation_review
  - done
  - blocked

human_gates:
  product_review:
    pass: design_assembly
    fail: knowledge_discovery
  system_rules_review:
    pass: task_breakdown
    fail: design_assembly
  implementation_review:
    pass: done
    fail: implementation_in_progress
    rework: task_breakdown

implementation:
  parallel_lanes:
    - frontend
    - backend
  role_sequence:
    frontend:
      - frontend_dev
      - frontend_test
    backend:
      - backend_dev
      - backend_test
  loop_max_attempts: 3
  after_test:
    - push_branch
    - create_merge_request
    - comment_merge_request_status

required_files:
  docs:
    - AGENTS.md
    - README.md
    - docs/agent-boot.md
    - docs/workflow.md
    - docs/state-transitions.md
    - docs/state-machine.svg
    - docs/roles.md
    - docs/human-gates.md
  scripts:
    - scripts/read-context.js
    - scripts/read-instructions.js
    - scripts/transition.js
    - scripts/transition-task.js
    - scripts/plan-agent-dispatch.js
    - scripts/record-agent-spawn.js
    - scripts/sync-linear-task.js
    - scripts/validate-state.js
